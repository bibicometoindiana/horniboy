<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hornyboy</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #000;
    }
    #search-bar {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
      background: #ddd;
      gap: 5px;
    }
    input[type="text"] {
      flex: 1;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #999;
      background: #fff;
      color: #000;
    }
    button {
      padding: 6px 10px;
      font-size: 14px;
      background: #fff;
      border: 1px solid #999;
      cursor: pointer;
    }
    #history {
      padding: 10px;
      background: #eee;
      font-size: 14px;
      overflow-y: auto;
      max-height: 100px;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 5px 10px;
      background: #ddd;
      font-size: 14px;
    }
    #views {
      flex: 1;
      display: flex;
      overflow: auto;
    }
    webview {
      flex: 1;
      border: none;
      min-width: 50%;
    }
    .hidden {
      display: none !important;
    }
    .loading-indicator {
      font-size: 12px;
      color: green;
      padding-left: 10px;
    }
  </style>
</head>
<body>
  <div id="search-bar">
    <input type="text" id="searchInput" placeholder="Search for products...">
    <button id="searchBtn">Search</button>
    <button id="clearBtn">Clear Cookies</button>
    <button id="clearHistoryBtn">Clear History</button>
  </div>
  <div id="history"></div>
  <div id="controls"></div>
  <div id="views"></div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const historyDiv = document.getElementById('history');
    const viewsContainer = document.getElementById('views');
    const controlsContainer = document.getElementById('controls');

    let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
    let toggleStates = JSON.parse(localStorage.getItem('toggleStates') || '{}');
    let webviews = [];

    function updateHistory(query) {
      if (!searchHistory.includes(query)) {
        searchHistory.unshift(query);
        if (searchHistory.length > 10) searchHistory.pop();
        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
      }
      renderHistory();
    }

    function renderHistory() {
      historyDiv.innerHTML = '<strong>Search History:</strong> ';
      searchHistory.forEach(term => {
        const btn = document.createElement('button');
        btn.textContent = term;
        btn.style.marginRight = '5px';
        btn.onclick = () => {
          searchInput.value = term;
          performSearch();
        };
        historyDiv.appendChild(btn);
      });
    }

    function clearWebviews() {
      viewsContainer.innerHTML = '';
      controlsContainer.innerHTML = '';
      webviews = [];
    }

    function extractDomain(url) {
      try {
        return new URL(url).hostname;
      } catch {
        return 'Site';
      }
    }

    function setLocationByDomain(domain) {
      if (domain.endsWith('.de')) {
        window.navigator.geolocation.getCurrentPosition = () => ({
          coords: { latitude: 51.1657, longitude: 10.4515 } // Germany
        });
      } else if (domain.endsWith('.at')) {
        window.navigator.geolocation.getCurrentPosition = () => ({
          coords: { latitude: 47.5162, longitude: 14.5501 } // Austria
        });
      }
    }

    function toggleWebview(index, domain) {
      const webview = document.getElementById(`webview-${index}`);
      webview.classList.toggle('hidden');
      toggleStates[domain] = webview.classList.contains('hidden');
      localStorage.setItem('toggleStates', JSON.stringify(toggleStates));
    }

    async function performSearch() {
      const query = searchInput.value.trim();
      if (!query) return;

      updateHistory(query);
      clearWebviews();

      const urls = await window.electronAPI.getSearchUrls();
      urls.forEach((template, index) => {
        const finalUrl = template.replace('{search_keyword}', encodeURIComponent(query));
        const siteName = extractDomain(template);

        const webview = document.createElement('webview');
        webview.src = finalUrl;
        webview.setAttribute('allowpopups', '');
        webview.id = `webview-${index}`;
        viewsContainer.appendChild(webview);
        webviews.push(webview);

        const controlGroup = document.createElement('div');
        controlGroup.innerHTML = `
          <strong>${siteName}:</strong>
          <button onclick="document.getElementById('webview-${index}').goBack()">◀️</button>
          <button onclick="document.getElementById('webview-${index}').goForward()">▶️</button>
          <button onclick="document.getElementById('webview-${index}').reload()">🔄</button>
          <button onclick="toggleWebview(${index}, '${siteName}')">Toggle</button>
          <span id="loading-${index}" class="loading-indicator"></span>
        `;
        controlsContainer.appendChild(controlGroup);

        webview.addEventListener('did-start-loading', () => {
          document.getElementById(`loading-${index}`).textContent = '[Loading…]';
        });
        webview.addEventListener('did-stop-loading', () => {
          document.getElementById(`loading-${index}`).textContent = '';
        });

        // Restore toggle state if previously hidden
        if (toggleStates[siteName]) {
          webview.classList.add('hidden');
        }
        
        //setLocationByDomain(siteName);
      });
    }

    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('clearBtn').addEventListener('click', () => {
      window.electronAPI.clearCookies();
      alert('Cookies cleared!');
    });
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      searchHistory = [];
      localStorage.removeItem('searchHistory');
      renderHistory();
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    renderHistory();
  </script>
</body>
</html>
