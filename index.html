<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Horniboy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 13px;
    }

    /* ── Search bar ────────────────────────────────────────── */
    #search-bar {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      gap: 6px;
      flex-shrink: 0;
    }
    #search-bar input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      font-size: 14px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #333;
      color: #fff;
      outline: none;
    }
    #search-bar input[type="text"]:focus { border-color: #888; }
    .btn {
      padding: 5px 10px;
      font-size: 12px;
      background: #3a3a3a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ddd;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #4a4a4a; }
    .btn.primary { background: #2e5fa3; border-color: #4a80c4; color: #fff; }
    .btn.primary:hover { background: #3a72bd; }

    /* ── History bar ───────────────────────────────────────── */
    #history {
      padding: 4px 8px;
      background: #252525;
      border-bottom: 1px solid #3a3a3a;
      font-size: 12px;
      overflow-x: auto;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 26px;
    }
    #history .hist-label { color: #888; margin-right: 6px; }
    #history .hist-btn {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 4px;
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      color: #ccc;
      cursor: pointer;
      font-size: 12px;
    }
    #history .hist-btn:hover { background: #444; color: #fff; }

    /* ── Groups ribbon ─────────────────────────────────────── */
    #groups-ribbon {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      background: #232323;
      border-bottom: 1px solid #3a3a3a;
      gap: 5px;
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 32px;
    }
    .groups-label { color: #888; font-size: 11px; white-space: nowrap; }

    .group-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid #555;
      background: #2e2e2e;
      color: #bbb;
      cursor: pointer;
      gap: 4px;
      font-size: 12px;
      user-select: none;
      will-change: opacity;
    }
    .group-pill.active {
      background: #2e5fa3;
      border-color: #4a80c4;
      color: #fff;
    }
    .group-pill:hover { background: #3a3a3a; }
    .group-pill.active:hover { background: #3a72bd; }
    .group-pill .pill-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .group-pill .pill-edit,
    .group-pill .pill-del {
      font-size: 11px;
      opacity: 0.6;
      cursor: pointer;
      padding: 0 2px;
    }
    .group-pill .pill-edit:hover,
    .group-pill .pill-del:hover { opacity: 1; }

    .group-pill-edit-input {
      padding: 2px 6px;
      font-size: 12px;
      border: 1px solid #4a80c4;
      border-radius: 10px;
      background: #1a1a1a;
      color: #fff;
      outline: none;
      width: 100px;
    }

    .btn-add-group {
      font-size: 18px;
      line-height: 1;
      padding: 1px 8px;
      border-radius: 12px;
    }
    .btn-select-all {
      padding: 2px 9px;
      font-size: 11px;
      border-radius: 10px;
      border-color: #555;
    }
    .btn-select-all.all-active {
      background: #2e5fa3;
      border-color: #4a80c4;
      color: #fff;
    }

    /* ── URL ribbon ────────────────────────────────────────── */
    #url-ribbon {
      display: flex;
      align-items: flex-start;
      padding: 5px 8px;
      background: #1c1c1c;
      border-bottom: 1px solid #3a3a3a;
      gap: 5px;
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 36px;
    }
    .url-label { color: #888; font-size: 11px; white-space: nowrap; margin-top: 5px; }

    .url-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #bbb;
      gap: 4px;
      font-size: 12px;
      user-select: none;
      max-width: 260px;
      overflow: hidden;
    }
    .url-chip.active {
      border-color: #2e8b57;
      background: #1a3a28;
      color: #7fcc9a;
    }
    .url-chip.inactive {
      opacity: 0.45;
    }
    .url-chip .chip-toggle {
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
    }
    .url-chip .chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      cursor: pointer;
      max-width: 140px;
    }
    .url-chip .chip-group-tag {
      font-size: 10px;
      background: #3a3a3a;
      border-radius: 3px;
      padding: 1px 4px;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .url-chip.active .chip-group-tag { background: #1e4d33; color: #5faa7a; }
    .url-chip .chip-edit,
    .url-chip .chip-del {
      font-size: 11px;
      opacity: 0.5;
      cursor: pointer;
      flex-shrink: 0;
    }
    .url-chip .chip-edit:hover,
    .url-chip .chip-del:hover { opacity: 1; }

    /* URL inline editor popup */
    .url-editor-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .url-editor-box {
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 18px 20px;
      width: 520px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .url-editor-box h3 { margin: 0; font-size: 14px; color: #ddd; }
    .url-editor-box label { font-size: 12px; color: #999; }
    .url-editor-box input, .url-editor-box select {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #1a1a1a;
      color: #fff;
      outline: none;
    }
    .url-editor-box input:focus, .url-editor-box select:focus { border-color: #4a80c4; }
    .url-editor-hint { font-size: 11px; color: #666; }
    .url-editor-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-add-url {
      font-size: 18px;
      line-height: 1;
      padding: 1px 8px;
      border-radius: 4px;
    }

    /* ── Controls bar ──────────────────────────────────────── */
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 8px;
      background: #222;
      border-bottom: 1px solid #3a3a3a;
      font-size: 12px;
      flex-shrink: 0;
      min-height: 30px;
    }
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
    }
    .ctrl-group strong { color: #aaa; margin-right: 3px; }
    .ctrl-btn {
      padding: 2px 6px;
      font-size: 12px;
      background: #333;
      border: 1px solid #4a4a4a;
      border-radius: 3px;
      color: #ccc;
      cursor: pointer;
    }
    .ctrl-btn:hover { background: #444; }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }
    .ctrl-btn:disabled:hover { background: #333; }

    /* ── Webview container ─────────────────────────────────── */

    webview {
      flex: 1;
      border: none;
      border-right: 1px solid #333;
      min-width: 300px;
    }
    webview:last-child { border-right: none; }
    .hidden { display: none !important; }

    /* ── Loading placeholder ───────────────────────────────── */
    .wv-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 300px;
      border-right: 1px solid #333;
      background: #1a1a1a;
      color: #555;
      font-size: 12px;
    }
    .wv-placeholder:last-child { border-right: none; }
    .wv-placeholder .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #333;
      border-top: 2px solid #4a80c4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Search bar -->
  <div id="search-bar">
    <input type="text" id="searchInput" placeholder="Search for products…">
    <button class="btn primary" id="searchBtn">Search</button>
    <button class="btn" id="clearBtn">Clear Cookies</button>
    <button class="btn" id="clearHistoryBtn">Clear History</button>
    <button class="btn" id="themeToggleBtn">☀️</button>
  </div>

  <!-- History -->
  <div id="history"></div>

  <!-- Groups ribbon -->
  <div id="groups-ribbon">
    <span class="groups-label">GROUPS</span>
    <div id="group-pills"></div>
    <button class="btn btn-select-all" id="selectAllGroupsBtn" title="Toggle all groups on/off">All</button>
    <button class="btn btn-add-group" id="addGroupBtn" title="Add new group">+</button>
  </div>

  <!-- URL ribbon -->
  <div id="url-ribbon">
    <span class="url-label">URLS</span>
    <div id="url-chips" style="display:flex;flex-wrap:wrap;gap:5px;flex:1;"></div>
    <button class="btn btn-add-url" id="addUrlBtn" title="Add new URL">+</button>
  </div>

  <!-- Saved searches ribbon -->
  <div id="saved-ribbon" style="display:flex;align-items:center;padding:4px 8px;background:var(--bg-tertiary);border-bottom:1px solid var(--border-light);gap:5px;flex-shrink:0;flex-wrap:wrap;min-height:28px;">
    <span style="color:var(--text-muted);font-size:11px;white-space:nowrap;">SAVED</span>
    <div id="saved-pills" style="display:flex;flex-wrap:wrap;gap:4px;flex:1;"></div>
    <button class="btn" id="saveSearchBtn" style="font-size:11px;padding:2px 7px;border-radius:10px;">+ Save</button>
  </div>

  <!-- Webview controls -->
  <div id="controls"></div>
  <!-- Auto-refresh static controls -->
  <div id="ar-controls" style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--bg-quaternary);border-bottom:1px solid var(--border-light);flex-shrink:0;font-size:11px;">
    <span class="auto-refresh-group">
      <strong>🔄 Auto</strong>
      <select id="arInterval">
        <option value="30">30s</option>
        <option value="60" selected>1min</option>
        <option value="120">2min</option>
        <option value="300">5min</option>
        <option value="600">10min</option>
      </select>
      <button class="ctrl-btn" id="arToggleBtn" style="font-size:10px;padding:1px 6px;">Auto</button>
      <span class="ar-countdown" id="ar-countdown"></span>
    </span>
    <span style="color:var(--text-muted);font-size:10px;">|</span>
    <button class="ctrl-btn" id="scrapeNowBtn" style="font-size:10px;padding:1px 6px;" title="Scrape prices now">💰</button>
  </div>


  <!-- Views container -->
  <div id="views-container" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <!-- Price bar -->
    <div id="price-bar" style="display:none;flex-direction:column;background:var(--bg-quaternary);border-bottom:1px solid var(--border-light);flex-shrink:0;max-height:200px;overflow-y:auto;"></div>
    <!-- Table view -->
    <div id="table-view" style="display:none;flex:1;overflow:auto;padding:8px;background:var(--bg-primary);"></div>
    <!-- Webviews -->
    <div id="views" style="flex:1;display:flex;overflow:auto;min-height:0;"></div>
  </div>

  <!-- URL editor modal (hidden) -->
  <div class="url-editor-overlay hidden" id="urlEditorOverlay">
    <div class="url-editor-box">
      <h3 id="urlEditorTitle">Edit URL</h3>
      <div>
        <label>Label (display name)</label>
        <input type="text" id="urlEditorLabel" placeholder="e.g. Hornbach DE">
      </div>
      <!-- Manual template -->
      <div>
        <label>Manual URL template — use <code>{search_keyword}</code> as placeholder</label>
        <input type="text" id="urlEditorTemplate" placeholder="https://example.com/search?q={search_keyword}">
        <div class="url-editor-hint">Type or paste a template with <code>{search_keyword}</code> already placed.</div>
      </div>

      <!-- Auto-detect section -->
      <div id="autoDetectSection" style="background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;padding:10px;display:flex;flex-direction:column;gap:8px;">
        <div style="font-size:11px;color:#888;font-weight:bold;letter-spacing:0.05em;">AUTO-DETECT FROM REAL URL</div>
        <div>
          <label>Paste a real search result URL</label>
          <input type="text" id="urlEditorRealUrl" placeholder="https://www.hornbach.de/s/bohrmaschine">
        </div>
        <div id="autoDetectResult" style="display:none;">
          <label>Auto-generated template</label>
          <div style="display:flex;gap:6px;align-items:center;">
            <input type="text" id="urlEditorAutoTemplate" readonly style="background:#111;color:#7fcc9a;border-color:#2e8b57;flex:1;">
            <button class="btn" id="useAutoTemplateBtn" style="white-space:nowrap;">Use this ↑</button>
          </div>
        </div>
        <div id="autoDetectError" style="display:none;font-size:11px;color:#e57373;"></div>
      </div>

      <!-- Template source choice -->
      <div id="templateSourceRow" style="display:none;align-items:center;gap:12px;font-size:12px;">
        <span style="color:#888;">Save using:</span>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:#ccc;">
          <input type="radio" name="templateSource" value="manual" id="srcManual"> Manual template
        </label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:#7fcc9a;">
          <input type="radio" name="templateSource" value="auto" id="srcAuto" checked> Auto-detected template
        </label>
      </div>

      <div>
        <label>Group</label>
        <select id="urlEditorGroup"></select>
      </div>
      <div class="url-editor-actions">
        <button class="btn" id="urlEditorCancel">Cancel</button>
        <button class="btn primary" id="urlEditorSave">Save</button>
      </div>
    </div>
  </div>

  <script>
  // ════════════════════════════════════════════════════════
  //  DATA MODEL
  // ════════════════════════════════════════════════════════

  // ── Poor man's uid ─────────────────────────────────────
  let _uidCounter = Date.now();
  function uid() { return (++_uidCounter).toString(36); }

  // ── Save/load with debounced IPC ──────────────────────
  let _saveTimeout = null;
  function loadData() {
    let groups = JSON.parse(localStorage.getItem('hb_groups') || 'null');
    let urls   = JSON.parse(localStorage.getItem('hb_urls')   || 'null');

    if (!groups || !urls) {
      groups = DEFAULT_GROUPS;
      urls   = DEFAULT_URLS;
    }
    return { groups, urls };
  }

  function saveData(groups, urls) {
    localStorage.setItem('hb_groups', JSON.stringify(groups));
    localStorage.setItem('hb_urls',   JSON.stringify(urls));
    // Debounce IPC — don't hammer disk on rapid toggles
    if (_saveTimeout) clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(() => {
      if (window.electronAPI && window.electronAPI.saveConfig) {
        window.electronAPI.saveConfig({ groups, urls });
      }
    }, 500);
  }

  const DEFAULT_GROUPS = [
    { id: 'g1', name: 'Baumarkt AT', active: true },
    { id: 'g2', name: 'Baumarkt DE', active: true },
    { id: 'g3', name: '3D Druck', active: true },
    { id: 'g4', name: 'Online Marktplätze', active: true },
    { id: 'g5', name: 'Elektronik', active: true },
    { id: 'g6', name: 'Werkzeug', active: true },
  ];

  const DEFAULT_URLS = [
    // ── Baumarkt AT ──
    { id: uid(), label: 'OBI AT',      template: 'https://www.obi.at/search/{search_keyword}?_availability=store', groupId: 'g1', enabled: true },
    { id: uid(), label: 'Bauhaus AT',  template: 'https://www.bauhaus.at/search?q={search_keyword}', groupId: 'g1', enabled: true },
    { id: uid(), label: 'Lagerhaus',   template: 'https://www.lagerhaus.at/marktplatz/suche?q={search_keyword}', groupId: 'g1', enabled: true },

    // ── Baumarkt DE ──
    { id: uid(), label: 'Hornbach DE', template: 'https://www.hornbach.de/s/{search_keyword}?f.dsall=im+Markt+vorrätig&isInitialRequest=false', groupId: 'g2', enabled: true },
    { id: uid(), label: 'Bauhaus DE',  template: 'https://www.bauhaus.info/search?availability=561&page=1&q={search_keyword}', groupId: 'g2', enabled: true },
    { id: uid(), label: 'OBI DE',      template: 'https://www.obi.de/search/{search_keyword}?_availability=store', groupId: 'g2', enabled: true },
    { id: uid(), label: 'toom',        template: 'https://toom.de/suche?q={search_keyword}', groupId: 'g2', enabled: true },
    { id: uid(), label: 'Hellweg',     template: 'https://www.hellweg.de/search?s={search_keyword}', groupId: 'g2', enabled: true },
    { id: uid(), label: 'hagebau',     template: 'https://www.hagebau.de/search/?q={search_keyword}', groupId: 'g2', enabled: true },
    { id: uid(), label: 'Sonderpreis', template: 'https://www.sonderpreis-baumarkt.de/search?q={search_keyword}&search-button=&lang=de_DE', groupId: 'g2', enabled: true },

    // ── 3D Druck ──
    { id: uid(), label: '3DJake',      template: 'https://www.3djake.de/search?q={search_keyword}', groupId: 'g3', enabled: true },
    { id: uid(), label: 'Filamentwelt', template: 'https://www.filamentwelt.de/search?s={search_keyword}', groupId: 'g3', enabled: true },
    { id: uid(), label: 'Prusa',        template: 'https://www.prusa3d.com/search/?q={search_keyword}', groupId: 'g3', enabled: true },
    { id: uid(), label: 'Anycubic',     template: 'https://store.anycubic.com/search?q={search_keyword}', groupId: 'g3', enabled: true },

    // ── Online Marktplätze ──
    { id: uid(), label: 'Amazon DE',    template: 'https://www.amazon.de/s?k={search_keyword}', groupId: 'g4', enabled: true },
    { id: uid(), label: 'eBay DE',      template: 'https://www.ebay.de/sch/i.html?_nkw={search_keyword}', groupId: 'g4', enabled: true },
    { id: uid(), label: 'Willhaben',    template: 'https://www.willhaben.at/iad/kaufen-und-verkaufen/marktplatz?keyword={search_keyword}', groupId: 'g4', enabled: true },
    { id: uid(), label: 'Geizhals',     template: 'https://geizhals.de/?fs={search_keyword}', groupId: 'g4', enabled: true },
    { id: uid(), label: 'idealo',       template: 'https://www.idealo.de/preisvergleich/MainSearchProductCategory.html?q={search_keyword}', groupId: 'g4', enabled: true },

    // ── Elektronik ──
    { id: uid(), label: 'Conrad',       template: 'https://www.conrad.de/de/Search.html?search={search_keyword}', groupId: 'g5', enabled: true },
    { id: uid(), label: 'Reichelt',     template: 'https://www.reichelt.de/index.html?ACTION=446&s={search_keyword}', groupId: 'g5', enabled: true },

    // ── Werkzeug ──
    { id: uid(), label: 'Contorion',    template: 'https://www.contorion.de/search?q={search_keyword}', groupId: 'g6', enabled: true },
  ];

  // ════════════════════════════════════════════════════════
  //  DATA VERSION — migrate old defaults to new categories
  // ════════════════════════════════════════════════════════
  const DATA_VERSION = 2;
  const savedVersion = parseInt(localStorage.getItem('hb_version') || '0', 10);
  if (savedVersion < DATA_VERSION) {
    // Reset to new defaults if version is old
    const oldGroups = JSON.parse(localStorage.getItem('hb_groups') || 'null');
    if (oldGroups) {
      // Check if old group names match the pre-update format
      const isOld = oldGroups.some(g => g.name === 'Austria' || g.name === 'Germany');
      if (isOld) {
        localStorage.removeItem('hb_groups');
        localStorage.removeItem('hb_urls');
        localStorage.removeItem('hb_version');
        console.log('Migrated to new categories (v' + DATA_VERSION + ')');
      }
    }
    localStorage.setItem('hb_version', String(DATA_VERSION));
  }

  // ════════════════════════════════════════════════════════
  //  STATE
  // ════════════════════════════════════════════════════════
  let { groups, urls } = loadData();
  let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
  let webviews = [];

  // ════════════════════════════════════════════════════════
  //  THEME TOGGLE (Feature 7)
  // ════════════════════════════════════════════════════════
  let currentTheme = localStorage.getItem('hb_theme') || 'dark';
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    document.body.classList.toggle('dark', theme === 'dark');
    localStorage.setItem('hb_theme', theme);
    currentTheme = theme;
    const btn = document.getElementById('themeToggleBtn');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  // ===== FEATURE 2: SAVED SEARCHES (FAVORITEN) =====
  let savedSearches = JSON.parse(localStorage.getItem('hb_saved') || '[]');

  function renderSaved() {
    const container = document.getElementById('saved-pills');
    if (!container) return;
    container.innerHTML = '';
    savedSearches.forEach((s, i) => {
      const pill = document.createElement('span');
      pill.className = 'saved-pill';
      pill.innerHTML = `<span>${escHtml(s.name)}</span><span class="saved-del" data-idx="${i}">✕</span>`;
      pill.querySelector('span:first-child').addEventListener('click', () => {
        document.getElementById('searchInput').value = s.query;
        performSearch();
      });

  // ===== FEATURE 6: AUTO-REFRESH =====
  let autoRefreshInterval = null;
  let autoRefreshCountdown = null;
  let autoRefreshSeconds = 0;
  let autoRefreshEnabled = false;

  function startAutoRefresh(seconds) {
    stopAutoRefresh();
    autoRefreshEnabled = true;
    autoRefreshSeconds = seconds;
    // Show countdown
    const el = document.getElementById('ar-countdown');
    let remaining = seconds;
    const updateCountdown = () => {
      if (el) el.textContent = remaining + 's';
      remaining--;
      if (remaining < 0) remaining = seconds;
    };
    updateCountdown();
    autoRefreshCountdown = setInterval(updateCountdown, 1000);
    autoRefreshInterval = setInterval(() => {
      // Reload all webviews
      webviews.forEach(wv => {
        try { wv.reload(); } catch(e) {}
      });
      // Re-scrape prices after reload
      setTimeout(() => scrapePrices(), 3000);
    }, seconds * 1000);
    const btn = document.getElementById('arToggleBtn');
    if (btn) { btn.textContent = 'Stop'; btn.classList.add('active'); }
  }

  function stopAutoRefresh() {
    if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
    if (autoRefreshCountdown) { clearInterval(autoRefreshCountdown); autoRefreshCountdown = null; }
    autoRefreshEnabled = false;
    const el = document.getElementById('ar-countdown');
    if (el) el.textContent = '';
    const btn = document.getElementById('arToggleBtn');
    if (btn) { btn.textContent = 'Auto'; btn.classList.remove('active'); }
  }

  function toggleAutoRefresh() {
    if (autoRefreshEnabled) { stopAutoRefresh(); return; }
    const sel = document.getElementById('arInterval');
    if (!sel) return;
    const seconds = parseInt(sel.value, 10);
    startAutoRefresh(seconds);
  }

  let scrapedProducts = [];
  let viewMode = 'webview'; // 'webview' or 'table'

  // Per-site price extractors
  const PRICE_SELECTORS = [
    // Common selectors (tried first)
    { name: 'data-price attr', fn: () => {
      const els = document.querySelectorAll('[data-price]');
      return Array.from(els).map(el => ({ name: el.getAttribute('data-name') || el.getAttribute('data-product-name') || el.innerText.substring(0, 60), price: el.getAttribute('data-price') }));
    }},
    { name: '.price + .name', fn: () => {
      const items = [];
      // Generic: look for price-like elements near product-like elements
      document.querySelectorAll('.price, .product-price, .current-price, [class*="price"]').forEach(el => {
        const priceText = el.textContent.trim();
        const nameEl = el.closest('li, article, .product, .product-item, .result-item, .card, .tile')?.querySelector('h2, h3, .name, .title, .product-name, [class*="title"], a[title]');
        if (nameEl) items.push({ name: nameEl.textContent.trim().substring(0, 80), price: priceText });
      });
      return items;
    }},
    { name: 'product containers', fn: () => {
      const items = [];
      document.querySelectorAll('article, .product, .product-item, .result-item, .card, .tile, [class*="product"], li.product').forEach(container => {
        const nameEl = container.querySelector('h2, h3, .name, .title, .product-name, [class*="title"]');
        const priceEl = container.querySelector('[data-price], .price, .product-price, .current-price, [class*="price"]');
        if (nameEl && priceEl) {
          items.push({
            name: nameEl.textContent.trim().substring(0, 80),
            price: priceEl.getAttribute('data-price') || priceEl.textContent.trim()
          });
        }
      });

    }}
  ];

  async function scrapePrices() {
    scrapedProducts = [];
    const priceBar = document.getElementById('price-bar');
    
    // Wait a moment for webviews to render their JS content
    await new Promise(r => setTimeout(r, 2000));
    
    for (let i = 0; i < webviews.length; i++) {
      const wv = webviews[i];
      const siteName = document.querySelector(`#ctrl-${i} strong`)?.textContent || `Site ${i}`;
      
      try {
        // Execute price extraction in the webview
        const products = await wv.executeJavaScript(`
          (function() {
            const results = [];
            const selectors = [
              // Products with data attributes
              '[data-price]',
              '.price, .product-price, .current-price, [class*="price"]',
              // Product containers
              'article, .product-item, .result-item, .card, .tile, [class*="product-"]'
            ];
            
            // Try: data attributes (most reliable)
            document.querySelectorAll('[data-price]').forEach(el => {
              const name = el.getAttribute('data-name') || el.getAttribute('data-product-name') || el.getAttribute('title') || '';
              const price = el.getAttribute('data-price') || '';
              if (price) results.push({ name: name.substring(0, 80), price: price });
            });
            
            // Try: product containers
            document.querySelectorAll('article, .product-item, li.product, [class*="product-"], [class*="result-"], .card').forEach(container => {
              const nameEl = container.querySelector('h2, h3, .name, .title, .product-name, [class*="title"], a[title]');
              const priceEl = container.querySelector('[data-price], .price, .product-price, .current-price, span.price, [class*="price"]');
              if (nameEl && priceEl) {
                const name = (nameEl.textContent || nameEl.getAttribute('title') || '').trim().substring(0, 80);
                const price = priceEl.getAttribute('data-price') || priceEl.textContent.trim();
                if (name && price && name.length > 2) {
                  results.push({ name, price });
                }
              }
            });
            
            // Last resort: grab any elements that look like prices
            if (results.length === 0) {
              document.querySelectorAll('span, div, strong').forEach(el => {
                const text = el.textContent.trim();
                if (/^[€$]?\s*[0-9]+[,.][0-9]{2}\s*[€$]?$/.test(text)) {
                  const parent = el.closest('li, article, div') || el.parentElement;
                  const nameEl = parent.querySelector('h2, h3, a, strong, .name, [class*="title"]');
                  if (nameEl) {
                    const name = nameEl.textContent.trim().substring(0, 80);
                    if (name && name.length > 2 && !name.includes('Warenkorb') && !name.includes('Suchen')) {
                      results.push({ name, price: text });
                    }
                  }
                }
              });
            }
            
            return results.slice(0, 10); // Max 10 products per site
          })()
        `);
        
        if (products && products.length > 0) {
          products.forEach(p => {
            scrapedProducts.push({ site: siteName, ...p });
          });
        } else {
          scrapedProducts.push({ site: siteName, name: '—', price: '⚠️ no data' });
        }
      } catch (err) {
        scrapedProducts.push({ site: siteName, name: '—', price: '⚠️ error' });
      }
    }
    
    renderPriceBar();
    if (viewMode === 'table') renderTableView();
  }

  function renderPriceBar() {
    const bar = document.getElementById('price-bar');
    if (!bar) return;
    if (scrapedProducts.length === 0) {
      bar.innerHTML = '<div class="pb-header"><span class="pb-title">💰 Price Comparison</span><span class="pb-status" style="font-size:11px;color:var(--text-muted);">⏳ scraping...</span></div>';
      return;
    }
    
    // Group by site for compact display
    const bySite = {};
    scrapedProducts.forEach(p => {
      if (!bySite[p.site]) bySite[p.site] = [];
      bySite[p.site].push(p);
    });
    
    let html = '<div class="pb-header"><span class="pb-title">💰 Price Comparison</span><div class="pb-actions">';
    html += `<button onclick="toggleViewMode('table')">📋 Table</button>`;
    html += `<button onclick="document.getElementById('price-bar').classList.remove('visible')">✕</button>`;
    html += '</div></div>';
    
    Object.entries(bySite).forEach(([site, products]) => {
      products.forEach(p => {
        const priceClass = p.price.includes('⚠️') ? '' : 'pb-price';
        html += `<div class="pb-row"><span class="pb-store">${escHtml(site)}</span><span class="pb-name">${escHtml(p.name)}</span><span class="${priceClass}">${escHtml(p.price)}</span></div>`;
      });
    });
    
    bar.innerHTML = html;
    bar.classList.add('visible');
  }

  function renderTableView() {
    const tv = document.getElementById('table-view');
    if (!tv) return;
    
    let html = '<table><thead><tr><th>Store</th><th>Product</th><th>Price</th></tr></thead><tbody>';
    scrapedProducts.forEach(p => {
      const priceDisplay = p.price.includes('⚠️') ? `<span style="color:var(--text-muted)">${escHtml(p.price)}</span>` : escHtml(p.price);
      html += `<tr><td class="tv-store">${escHtml(p.site)}</td><td class="tv-name">${escHtml(p.name)}</td><td class="tv-price">${priceDisplay}</td></tr>`;
    });
    html += '</tbody></table>';
    
    tv.innerHTML = html;
  }

  }

    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      const val = input.value.trim();
      if (val) g.name = val;
      saveData(groups, urls);
      renderGroups();
      renderUrlChips();
    }
    function cancel() {
      if (committed) return;
      committed = true;
      renderGroups();
      renderUrlChips();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', commit); cancel(); }
    });
  }

  // ════════════════════════════════════════════════════════
  //  URL EDITOR MODAL (unchanged logic)
  // ════════════════════════════════════════════════════════
  let _editingUrlId = null;

  function detectSearchParam(rawUrl) {
    let url;
    try { url = new URL(rawUrl); } catch { return null; }

    const KNOWN_PARAMS = [
      'q', 'query', 'search', 'keyword', 'keywords', 'k', 's', 'text',
      'term', 'terms', 'searchQuery', 'search_query', 'search_term',
      'suche', 'suchbegriff', 'zoekterm', 'zoeken', 'searchterm',
      'qs', 'sq', 'w', 'p', 'find', 'input', 'str', 'string', 'words',
    ];

    for (const key of KNOWN_PARAMS) {
      for (const [k, v] of url.searchParams) {
        if (k.toLowerCase() === key && v && v.trim()) {
          const template = rawUrl.replace(
            new RegExp(escapeRegex(encodeURIComponent(v)) + '|' +
                       escapeRegex(v.replace(/ /g,'+'))   + '|' +
                       escapeRegex(v), 'g'),
            '{search_keyword}'
          );
          return { template, reason: 'query param "' + k + '"' };
        }
      }
    }

    const SKIP_LOOKS = /^[\d]+$|^[0-9a-f-]{32,}$/i;
    for (const [k, v] of url.searchParams) {
      if (!v || !v.trim()) continue;
      if (SKIP_LOOKS.test(v)) continue;
      if (/[a-zA-ZÀ-ž]/.test(v) && v.length >= 2) {
        const template = rawUrl.replace(
          new RegExp(escapeRegex(encodeURIComponent(v)) + '|' +
                     escapeRegex(v.replace(/ /g,'+'))   + '|' +
                     escapeRegex(v), 'g'),
          '{search_keyword}'
        );
        return { template, reason: 'query param "' + k + '" (auto-detected)' };
      }
    }

    const PATH_PREFIXES = [
      '/search/', '/s/', '/suche/', '/zoeken/', '/find/', '/results/',
      '/result/', '/query/', '/catalogsearch/result/q/', '/buscar/',
      '/recherche/', '/cerca/', '/szukaj/', '/sok/', '/sok-', '/hledat/',
    ];
    const pathname = url.pathname;
    for (const prefix of PATH_PREFIXES) {
      const idx = pathname.toLowerCase().indexOf(prefix);
      if (idx !== -1) {
        const after = pathname.slice(idx + prefix.length);
        const segment = after.split('/')[0];
        if (segment && isSearchySegment(segment)) {
          const decoded = decodeURIComponent(segment);
          const template = rawUrl.replace(
            new RegExp(escapeRegex(encodeURIComponent(decoded)) + '|' +
                       escapeRegex(segment.replace(/\+/g,'%20'))+ '|' +
                       escapeRegex(segment), 'g'),
            '{search_keyword}'
          );
          return { template, reason: 'path after "' + prefix.replace(/\//g,'') + '"' };
        }
      }
    }

    const segments = pathname.split('/').filter(Boolean);
    for (let i = segments.length - 1; i >= 0; i--) {
      const seg = segments[i];
      const decoded = decodeURIComponent(seg);
      if (isSearchySegment(seg) && /[a-zA-ZÀ-ž]/.test(decoded) && decoded.length >= 2) {
        const template = rawUrl.replace(
          new RegExp(escapeRegex(encodeURIComponent(decoded)) + '|' +
                     escapeRegex(seg), 'g'),
          '{search_keyword}'
        );
        return { template, reason: 'path segment "' + decoded + '"' };
      }
    }

    return null;
  }

  function isSearchySegment(seg) {
    const d = decodeURIComponent(seg);
    if (/^[\d]+$/.test(d)) return false;
    if (/^[0-9a-f-]{32,}$/i.test(d)) return false;
    if (/\.\w{2,4}$/.test(d)) return false;
    if (d.length < 2) return false;
    return true;
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function runAutoDetect() {
    const realUrl  = document.getElementById('urlEditorRealUrl').value.trim();
    const resultEl = document.getElementById('autoDetectResult');
    const errorEl  = document.getElementById('autoDetectError');
    const srcRow   = document.getElementById('templateSourceRow');
    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    if (!realUrl) return;
    const result = detectSearchParam(realUrl);
    if (result) {
      document.getElementById('urlEditorAutoTemplate').value = result.template;
      errorEl.textContent = 'Detected: ' + result.reason;
      errorEl.style.color = '#7fcc9a';
      errorEl.style.display = 'block';
      resultEl.style.display = 'block';
      srcRow.style.display = 'flex';
      document.getElementById('srcAuto').checked = true;
    } else {
      errorEl.textContent = 'Could not auto-detect the search position. Use the manual template field.';
      errorEl.style.color = '#e57373';
      errorEl.style.display = 'block';
      srcRow.style.display = 'none';
    }
  }

  document.getElementById('urlEditorSave').addEventListener('click', () => {
    const label   = document.getElementById('urlEditorLabel').value.trim();

    const useAuto = document.getElementById('srcAuto') && document.getElementById('srcAuto').checked;
    const manualTmpl = document.getElementById('urlEditorTemplate').value.trim();

    const template   = useAuto && autoTmpl ? autoTmpl : manualTmpl;

    if (!template) { alert('URL template is required.'); return; }
    if (!template.includes('{search_keyword}')) {
      const warnEl = document.getElementById('autoDetectError');

    if (_editingUrlId) {

    } else {
      urls.push({ id: uid(), label, template, groupId, enabled: true });
    }

    saveData(groups, urls);
    closeUrlEditor();
    renderUrlChips();
  });

  // ════════════════════════════════════════════════════════
  //  ADD BUTTONS
  // ════════════════════════════════════════════════════════
  document.getElementById('addGroupBtn').addEventListener('click', () => {
    const container = document.getElementById('group-pills');
    if (container.querySelector('.group-pill-edit-input')) return;
    const input = document.createElement('input');
    input.className = 'group-pill-edit-input';
    input.placeholder = 'Group name…';
    input.style.marginRight = '4px';
    container.appendChild(input);
    input.focus();

    function commit() {
      const val = input.value.trim();
      input.remove();
      if (!val) return;
      groups.push({ id: uid(), name: val, active: true });
      saveData(groups, urls);
      renderGroups();
      renderUrlChips();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { input.remove(); }
    });
  });

  document.getElementById('addUrlBtn').addEventListener('click', () => {
    openUrlEditor(null);
  });

  function updateSelectAllBtn() {
    const btn = document.getElementById('selectAllGroupsBtn');
    if (!btn) return;
    const allActive = groups.length > 0 && groups.every(g => g.active);
    btn.classList.toggle('all-active', allActive);
    btn.title = allActive ? 'Deselect all groups' : 'Select all groups';
  }

  document.getElementById('selectAllGroupsBtn').addEventListener('click', () => {
    const allActive = groups.every(g => g.active);
    groups.forEach(g => { g.active = !allActive; });
    saveData(groups, urls);
    renderGroups();
    renderUrlChips();
  });

  // ════════════════════════════════════════════════════════
  //  SEARCH — OPTIMIZED: staggered webview loading
  // ════════════════════════════════════════════════════════
  function updateHistory(query) {
    if (!searchHistory.some(h => h.toLowerCase() === query.toLowerCase())) {
      searchHistory.unshift(query);
      if (searchHistory.length > 20) searchHistory.pop();
      localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
    }
    renderHistory();
  }

  function clearWebviews() {
    document.getElementById('views').innerHTML = '';
    document.getElementById('controls').innerHTML = '';
    document.getElementById('price-bar').classList.remove('visible');
    document.getElementById('price-bar').innerHTML = '';
    document.getElementById('table-view').style.display = 'none';
    document.getElementById('table-view').innerHTML = '';
    scrapedProducts = [];
    webviews = [];
  }

  function extractDomain(url) {
    try { return new URL(url).hostname; } catch { return 'Site'; }
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /** Create a placeholder div with spinner for a loading webview slot */
  function createPlaceholder(index, siteName) {
    const ph = document.createElement('div');
    ph.className = 'wv-placeholder';
    ph.id = `ph-${index}`;
    ph.innerHTML = `<div class="spinner"></div><div>${escHtml(siteName)}</div>`;
    return ph;
  }

  function performSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    updateHistory(query);
    clearWebviews();

    const active = effectiveUrls();
    if (active.length === 0) {
      document.getElementById('views').innerHTML = '<div style="padding:20px;color:#888;">No active URLs. Enable some URLs or activate a group.</div>';
      return;
    }

    const viewsEl = document.getElementById('views');

    // Track loaded webview count for "all done" indicator
    let loadedCount = 0;
    const totalCount = active.length;

    // ── Staggered webview loading ───────────────────────────
    // Place all placeholders immediately so layout is stable,
    // then spawn real webviews one at a time (300ms apart) to
    // avoid hammering the CPU/network with 5+ simultaneous loads.
    active.forEach((u, index) => {
      const siteName = u.label || extractDomain(u.template);

      // 1. Create placeholder
      const ph = createPlaceholder(index, siteName);
      viewsEl.appendChild(ph);

      // 2. Create control (disabled until webview is ready)
      const ctrl = document.createElement('div');
      ctrl.className = 'ctrl-group';
      ctrl.id = `ctrl-${index}`;
      ctrl.innerHTML = `
        <strong>${escHtml(siteName)}</strong>
        <button class="ctrl-btn" id="cb-${index}-back" disabled>◀</button>
        <button class="ctrl-btn" id="cb-${index}-fwd" disabled>▶</button>
        <button class="ctrl-btn" id="cb-${index}-reload" disabled>↺</button>
        <button class="ctrl-btn" data-toggle="${index}" disabled>Hide</button>
        <span id="loading-${index}" class="loading-indicator">⏳ queued</span>
      `;
      document.getElementById('controls').appendChild(ctrl);
    });

    // 3. Spawn webviews one at a time, staggered
    function spawnWebview(index) {
      if (index >= active.length) return;

      const u = active[index];
      const finalUrl = u.template.replace('{search_keyword}', encodeURIComponent(query));
      const siteName = u.label || extractDomain(u.template);

      // Replace placeholder with real webview
      const ph = document.getElementById(`ph-${index}`);
      if (!ph) { spawnWebview(index + 1); return; }

      const wv = document.createElement('webview');
      wv.src = finalUrl;
      wv.setAttribute('allowpopups', '');
      wv.id = `webview-${index}`;

      // Swap placeholder → webview in one DOM operation
      ph.parentNode.replaceChild(wv, ph);
      webviews.push(wv);

      // Update loading indicator
      const loadingEl = document.getElementById(`loading-${index}`);
      if (loadingEl) loadingEl.textContent = 'Loading…';

      // Enable controls on load
      wv.addEventListener('did-stop-loading', () => {
        if (loadingEl) loadingEl.textContent = '';
        // Enable controls once loaded
        document.getElementById(`cb-${index}-back`)?.removeAttribute('disabled');
        document.getElementById(`cb-${index}-fwd`)?.removeAttribute('disabled');
        document.getElementById(`cb-${index}-reload`)?.removeAttribute('disabled');
        const toggleBtn = document.querySelector(`[data-toggle="${index}"]`);
        if (toggleBtn) { toggleBtn.removeAttribute('disabled'); toggleBtn.textContent = 'Hide'; }

        loadedCount++;
        if (loadedCount === totalCount) {
          // All loaded — scrape prices after delays for JS rendering
          // Try multiple times with increasing delays
          [3000, 6000, 10000].forEach(delay => setTimeout(() => scrapePrices(), delay));
        }
      });

      wv.addEventListener('did-fail-load', (event) => {
        if (loadingEl) {
          loadingEl.textContent = event.errorDescription.includes('ERR_ABORTED') ? '⚠️ stopped' : `❌ ${event.errorDescription}`;
          loadingEl.style.color = '#e57373';
        }
        const toggleBtn = document.querySelector(`[data-toggle="${index}"]`);
        if (toggleBtn) { toggleBtn.removeAttribute('disabled'); toggleBtn.textContent = 'Error'; }

        loadedCount++;
      });

      // Schedule next webview with stagger delay
      setTimeout(() => spawnWebview(index + 1), 300);
    }

    // Kick off staggered loading after a small initial delay
    // so the UI has time to paint placeholders
    setTimeout(() => spawnWebview(0), 50);
  }

  function toggleWebview(index) {
    const wv = document.getElementById(`webview-${index}`);
    const btn = document.querySelector(`[data-toggle="${index}"]`);
    if (!wv) return;
    const hidden = wv.classList.toggle('hidden');
    if (btn) btn.textContent = hidden ? 'Show' : 'Hide';
  }

  // ════════════════════════════════════════════════════════
  //  EVENT LISTENERS
  // ════════════════════════════════════════════════════════
  document.getElementById('searchBtn').addEventListener('click', performSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') performSearch();
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (window.electronAPI) window.electronAPI.clearCookies();
    alert('Cookies cleared!');
  });

  document.getElementById('arToggleBtn').addEventListener('click', toggleAutoRefresh);
  document.getElementById('scrapeNowBtn').addEventListener('click', () => {
    if (webviews.length > 0) scrapePrices();
  });
  // Reset auto-refresh when performing new search
  const origPerformSearch = performSearch;
  performSearch = function() {
    stopAutoRefresh();
    origPerformSearch.apply(this, arguments);
  };

  document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    searchHistory = [];
    localStorage.removeItem('searchHistory');
    renderHistory();
  });
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  });
  document.getElementById('saveSearchBtn').addEventListener('click', saveCurrentSearch);

  // ════════════════════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════════════════════
  // Apply saved theme
  applyTheme(currentTheme);
  renderHistory();
  renderGroups();
  renderUrlChips();
  renderSaved();

  if (!localStorage.getItem('hb_groups') || !localStorage.getItem('hb_urls')) {
    if (window.electronAPI && window.electronAPI.loadConfig) {
      window.electronAPI.loadConfig().then(cfg => {
        if (cfg) {
          if (cfg.groups && cfg.urls) {
            groups = cfg.groups;
            urls   = cfg.urls;
          }
          if (cfg.legacyUrls && Array.isArray(cfg.legacyUrls) && (!groups || groups.length === 0)) {
            groups = [
              { id: 'g1', name: 'Austria', active: true },
              { id: 'g2', name: 'Germany', active: true },
            ];
            urls = cfg.legacyUrls.map(t => ({
              id: uid(), label: extractLegacyLabel(t) || 'Site',
              template: t, groupId: null, enabled: true
            }));
          }
          saveData(groups, urls);
          renderGroups();
          renderUrlChips();
        } else {
          saveData(groups, urls);
        }
      }).catch(e => {
        console.warn('IPC load-config failed, using defaults', e);
        saveData(groups, urls);
      });
    } else {
      saveData(groups, urls);
    }
  }

  function extractLegacyLabel(template) {
    try { return new URL(template).hostname.replace('www.', ''); }
    catch { return null; }
  }

  </script>
</body>
</html>
